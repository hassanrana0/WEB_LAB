<!DOCTYPE html>
<html lang="en">
<head>
    <title>Courses</title>
    <meta charset="UTF-8">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center">Select Courses</h2>

    <form id="courseForm">

        <div class="form-check">
            <input class="form-check-input" type="checkbox" value="Web Development" id="c1">
            <label class="form-check-label">Web Development</label>
        </div>

        <div class="form-check">
            <input class="form-check-input" type="checkbox" value="Artificial Intelligence" id="c2">
            <label class="form-check-label">Artificial Intelligence</label>
        </div>

        <div class="form-check">
            <input class="form-check-input" type="checkbox" value="Database Systems" id="c3">
            <label class="form-check-label">Database Systems</label>
        </div>

        <div class="form-check">
            <input class="form-check-input" type="checkbox" value="Mobile App Development" id="c4">
            <label class="form-check-label">Mobile App Development</label>
        </div>

        <button type="button" class="btn btn-primary mt-3" onclick="submitCourses()">
            Submit Courses
        </button>

    </form>

    <!-- Back Button -->
    <div class="mt-3">
        <a href="dashboard.html" class="btn btn-secondary">Back to Dashboard</a>
    </div>

</div>

<script src="course.js"></script>

</body>
</html>
